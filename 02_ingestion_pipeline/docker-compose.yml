x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE:-sts-data-ingestion-airflow:local}
  build:
    context: .
    dockerfile: Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/simple_auth_manager_passwords.json
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-Bf9t0IOcCK6rH-JxPX2uMmPak9mP_f8ly7neWnAfDHE=}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://stsbeyond:1@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-sts-local-test-key-not-for-prod}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-sts-local-test-key-not-for-prod}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-sts-local-jwt-secret-fixed}
    AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
    AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW__SMTP__SMTP_HOST:-smtp.gmail.com}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW__SMTP__SMTP_STARTTLS:-True}
    AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW__SMTP__SMTP_SSL:-False}
    AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW__SMTP__SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW__SMTP__SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW__SMTP__SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW__SMTP__SMTP_MAIL_FROM:-}
    AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-STS}
    AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
    AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@stscorp.local}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_USER: stsbeyond
    POSTGRES_PASSWORD: "1"
    POSTGRES_DB: data_ingestion
    MONGO_HOST: mongo
    MONGO_PORT: 27017
    MONGO_DB_NAME: etl_pipeline_db
    MONGO_TIMEOUT: 5000
    MONGO_DIRECT_CONNECTION: "True"
    GOOGLE_CREDENTIALS_PATH: /opt/airflow/client_secret.json
    GOOGLE_TOKEN_PATH: /opt/airflow/google_tokens/client_secret.token.json
    GOOGLE_DRIVE_SCOPES: ${GOOGLE_DRIVE_SCOPES:-https://www.googleapis.com/auth/drive.readonly}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    OPENAI_MAX_CONTEXT_WINDOW: ${OPENAI_MAX_CONTEXT_WINDOW:-128000}
    S3_BUCKET: ${S3_BUCKET:-}
    S3_REGION: ${S3_REGION:-ap-southeast-1}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    DEBUG: "False"
    PYTHONPATH: /opt/airflow/src:/opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./scripts:/opt/airflow/scripts
    - ./service_settings.json:/opt/airflow/service_settings.json:ro
    - ./client_secret.json:/opt/airflow/client_secret.json:ro
    - ./google_tokens:/opt/airflow/google_tokens

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: stsbeyond
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/01-init-dbs.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stsbeyond -d data_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 15

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: etl_pipeline_db
    volumes:
      - mongo-data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/01-init-mongo.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 15

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - /opt/airflow/scripts/entrypoint-init.sh
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data:
